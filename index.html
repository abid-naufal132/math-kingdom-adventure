<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Safari Adventure: Kerajaan Nombor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        <!-- Splash Screen -->
        <section id="splash-screen" class="screen active">
            <div class="content">
                <h1 class="game-title">Math Safari Adventure</h1>
                <h2 class="game-subtitle">Kerajaan Nombor</h2>
                <div class="avatar-preview">🦁</div>
                <button id="start-game-btn" class="btn-primary">MULA</button>
            </div>
        </section>

        <!-- Level Selection Screen -->
        <section id="level-selection-screen" class="screen">
            <header>
                <button class="back-btn">⬅️</button>
                <h1>Pilih Tahap</h1>
            </header>
            <div class="level-list">
                <button class="level-card" data-level="1">
                    <span class="level-num">1</span>
                    <span class="level-desc">Tambah & Tolak (0-10)</span>
                </button>
                <button class="level-card locked" data-level="2" disabled>
                    <span class="level-num">2</span>
                    <span class="level-desc">Tambah & Tolak (0-15)</span>
                    <span class="lock-icon">🔒</span>
                </button>
                <button class="level-card locked" data-level="3" disabled>
                    <span class="level-num">3</span>
                    <span class="level-desc">Tambah & Tolak (0-20)</span>
                    <span class="lock-icon">🔒</span>
                </button>
            </div>
        </section>

        <!-- Map Screen -->
        <section id="map-screen" class="screen">
            <header>
                <button class="back-btn">⬅️</button>
                <div class="stats">
                    <span id="map-stars">⭐ 0</span>
                </div>
            </header>
            <div class="map-container">
                <div id="safari-path" class="path">
                    <!-- Nodes will be generated by JS -->
                </div>
            </div>
        </section>

        <!-- Game Screen -->
        <section id="game-screen" class="screen">
            <div class="game-header">
                <button id="exit-game-btn" class="icon-btn">🏠</button>
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
                <div id="game-score">⭐ 0</div>
            </div>

            <div class="question-container">
                <div id="level-tag">Tahap 1</div>
                <div id="question-text">1 + 1 = ?</div>
            </div>

            <div id="options-container" class="options-grid">
                <!-- Buttons will be generated by JS -->
            </div>

            <div id="feedback-message" class="hidden"></div>
        </section>

        <!-- Result Screen -->
        <section id="result-screen" class="screen">
            <div class="result-box">
                <h1 id="result-title">Hebat!</h1>
                <div class="result-stars" id="result-stars-display">⭐⭐⭐</div>
                <div class="result-stats">
                    <p>Skor: <span id="final-score">0</span></p>
                </div>
                <div class="result-actions">
                    <button id="retry-btn" class="btn-secondary">Cuba Lagi</button>
                    <button id="map-return-btn" class="btn-primary">Peta Safari</button>
                </div>
            </div>
        </section>
    </div>

    <!-- Feedback Overlays -->
    <div id="overlay-correct" class="overlay hidden">
        <div class="overlay-content bounce">
            <span class="feedback-icon">✅</span>
            <p>BETUL!</p>
        </div>
    </div>
    <div id="overlay-wrong" class="overlay hidden">
        <div class="overlay-content shake">
            <span class="feedback-icon">❌</span>
            <p>CUBA LAGI</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

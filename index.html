<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Safari Adventure: Kerajaan Nombor</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        <div class="bg-decorations">
            <div class="cloud" style="top: 10%; left: 10%; animation-duration: 20s;"></div>
            <div class="cloud" style="top: 25%; right: 15%; animation-duration: 25s; animation-delay: -5s;"></div>
            <div class="leaf" style="bottom: 10%; left: 5%; animation-duration: 15s;"></div>
            <div class="leaf" style="bottom: 20%; right: 10%; animation-duration: 18s; animation-delay: -3s;"></div>
        </div>
        <!-- Splash Screen -->
        <section id="splash-screen" class="screen active">
            <div class="settings-btns" style="position: absolute; top: 20px; right: 20px; z-index: 20;">
                <button id="main-lang-toggle" class="icon-btn" style="font-weight: 900; font-size: 0.9rem;">BM</button>
            </div>
            <div class="game-title-container text-center">
                <h1 class="game-title">Math Safari</h1>
                <h2 class="game-subtitle">Kerajaan Nombor</h2>
            </div>
            <div class="avatar-display mt-20" id="main-avatar-preview">
                <!-- SVG Icon will be injected here -->
            </div>
            <button id="start-game-btn" class="btn-block btn-primary">MULA / START</button>
            <button id="open-dashboard-btn" class="btn-block btn-secondary mt-20" style="padding: 12px;">STATS</button>
        </section>

        <!-- Avatar Selection Screen -->
        <section id="avatar-screen" class="screen">
            <div class="top-nav">
                <button class="icon-btn back-to-splash">
                    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <h1 data-key="choose_avatar">Pilih Hero</h1>
            </div>
            <div class="avatar-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px;">
                <button class="avatar-choice card" data-avatar="lion">
                    <div class="avatar-icon-svg" data-icon="lion"></div>
                    <p style="font-weight: 900; margin-top: 10px;">Leo</p>
                </button>
                <button class="avatar-choice card" data-avatar="monkey">
                    <div class="avatar-icon-svg" data-icon="monkey"></div>
                    <p style="font-weight: 900; margin-top: 10px;">Momo</p>
                </button>
                <button class="avatar-choice card" data-avatar="zebra">
                    <div class="avatar-icon-svg" data-icon="zebra"></div>
                    <p style="font-weight: 900; margin-top: 10px;">Zizi</p>
                </button>
                <button class="avatar-choice card" data-avatar="elephant">
                    <div class="avatar-icon-svg" data-icon="elephant"></div>
                    <p style="font-weight: 900; margin-top: 10px;">Elly</p>
                </button>
            </div>
        </section>

        <!-- Level Selection Screen -->
        <section id="level-selection-screen" class="screen">
            <div class="top-nav">
                <button class="icon-btn back-to-avatar">
                    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <h1 data-key="select_level">Pilih Tahap</h1>
                <div class="settings-btns" style="display: flex; gap: 8px;">
                    <button id="lang-toggle" class="icon-btn" style="font-weight: 900; font-size: 0.9rem;">BM</button>
                    <button id="accessibility-btn" class="icon-btn">
                        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg>
                    </button>
                </div>
            </div>
            <div class="level-grid" id="level-list">
                <!-- Levels generated by JS -->
            </div>
        </section>

        <!-- Map Screen -->
        <section id="map-screen" class="screen">
            <div class="top-nav">
                <button class="icon-btn back-to-levels">
                    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <div class="game-stats icon-btn" style="width: auto; gap: 8px;">
                    <svg viewBox="0 0 24 24" style="fill: #f1c40f; stroke: #c29d0b;"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <span class="star-balance-count" style="font-weight: 900;">0</span>
                </div>
            </div>
            <div class="map-container">
                <div id="safari-path">
                    <!-- Nodes generated by JS -->
                </div>
            </div>
            <div class="mt-20">
                <button id="play-level-btn" class="btn-block btn-accent" data-key="play">MAIN</button>
            </div>
        </section>

        <!-- Game Screen -->
        <section id="game-screen" class="screen">
            <div class="top-nav">
                <button id="exit-game-btn" class="icon-btn">
                    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </button>
                <div class="progress-container">
                    <div id="progress-bar" class="progress-fill"></div>
                </div>
                <div class="game-stats icon-btn" style="width: auto; gap: 8px;">
                    <svg viewBox="0 0 24 24" style="fill: #f1c40f; stroke: #c29d0b; width: 20px; height: 20px;"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <span class="star-balance-count" style="font-weight: 900;">0</span>
                </div>
            </div>

            <div class="question-area">
                <div id="level-label" style="font-weight: 900; color: var(--secondary-color); margin-bottom: 5px;">TAHAP 1</div>
                <div style="display: flex; justify-content: center; align-items: center; gap: 15px;">
                    <div id="question-text" class="q-text">0 + 0</div>
                    <button id="replay-voice-btn" class="icon-btn" style="width: 44px; height: 44px; border-radius: 50%;">
                        <svg viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    </button>
                </div>
            </div>

            <div id="options-container" class="options-grid">
                <!-- Generated by JS -->
            </div>

            <div style="display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 20px;">
                <button id="buy-hint-btn" class="btn-block btn-accent" style="padding: 12px; font-size: 1rem; width: auto; min-width: 180px;">
                    <svg viewBox="0 0 24 24" style="fill: #f1c40f; stroke: #c29d0b; width: 20px; height: 20px;"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <span data-key="buy_hint">Guna 10 Bintang</span>
                </button>
                <div id="hint-box" class="card hidden" style="background: #fff9db; border-color: #fab005; padding: 15px; width: 100%; animation: popIn 0.3s ease;">
                    <p id="hint-text" style="font-weight: 700; color: #f08c00; text-align: center; font-size: 1.2rem;"></p>
                </div>
            </div>
        </section>

        <!-- Result Screen -->
        <section id="result-screen" class="screen">
            <div class="card text-center" style="padding: 40px 20px;">
                <h1 id="result-title" data-key="well_done">Hebat!</h1>
                <div class="star-rating" id="result-stars" style="display: flex; justify-content: center; gap: 10px; margin: 20px 0;">
                    <!-- Stars injected here -->
                </div>
                <div style="font-size: 1.5rem; margin-bottom: 10px; font-weight: 900;">
                    <span data-key="score">Skor</span>: <span id="final-score">0</span>
                </div>
                <div id="auto-continue-timer" style="font-size: 0.9rem; font-weight: 700; color: var(--secondary-color); margin-bottom: 20px;"></div>
                <div id="reward-display" class="mt-20 mb-20">
                    <!-- Unlockable animals injected here -->
                </div>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <button id="map-return-btn" class="btn-block btn-primary" data-key="continue">TERUSKAN</button>
                    <button id="retry-btn" class="btn-block btn-secondary" data-key="retry">CUBA LAGI</button>
                    <button id="replay-all-btn" class="btn-block btn-accent hidden" data-key="replay_all">MAIN SEMULA</button>
                    <button id="practice-mode-btn" class="btn-block btn-secondary hidden" data-key="practice_mode">MOD LATIHAN</button>
                </div>
            </div>
        </section>

        <!-- Accessibility Screen -->
        <section id="accessibility-screen" class="screen">
            <div class="top-nav">
                <button class="icon-btn back-to-levels">
                    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <h1 data-key="accessibility">Aksesibilitas</h1>
            </div>
            <div class="settings-list">
                <div class="setting-item">
                    <span data-key="high_contrast">Kontras Tinggi</span>
                    <button id="toggle-contrast" class="icon-btn" style="width: 80px;">OFF</button>
                </div>
                <div class="setting-item">
                    <span data-key="dyslexia_font">Font Disleksia</span>
                    <button id="toggle-dyslexia" class="icon-btn" style="width: 80px;">OFF</button>
                </div>
                <div class="setting-item">
                    <span data-key="text_size">Saiz Teks</span>
                    <div style="display: flex; gap: 10px;">
                        <button id="text-smaller" class="icon-btn" style="width: 44px;">A-</button>
                        <button id="text-larger" class="icon-btn" style="width: 44px;">A+</button>
                    </div>
                </div>
                <div class="setting-item">
                    <span data-key="voice_toggle">Suara</span>
                    <button id="toggle-voice-global" class="icon-btn" style="width: 80px;">ON</button>
                </div>
                <div class="setting-item">
                    <span data-key="bgm_toggle">Muzik Latar</span>
                    <button id="toggle-bgm" class="icon-btn" style="width: 80px;">ON</button>
                </div>
                <div class="setting-item" style="flex-direction: column; align-items: flex-start; gap: 10px;">
                    <span data-key="bgm_volume">Volume Muzik</span>
                    <input type="range" id="bgm-slider" min="0" max="1" step="0.1" value="0.3" style="width: 100%;">
                </div>
                <div class="setting-item" style="flex-direction: column; align-items: flex-start; gap: 10px;">
                    <span data-key="sfx_volume">Volume Kesan Bunyi</span>
                    <input type="range" id="sfx-slider" min="0" max="1" step="0.1" value="0.5" style="width: 100%;">
                </div>
                <div class="setting-item">
                    <span data-key="reduced_motion">Kurangkan Animasi</span>
                    <button id="toggle-motion" class="icon-btn" style="width: 80px;">OFF</button>
                </div>
            </div>
        </section>

        <!-- Dashboard Screen -->
        <section id="dashboard-screen" class="screen">
            <div class="top-nav">
                <button class="icon-btn back-to-splash">
                    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <h1 data-key="dashboard_title">Dashboard Guru</h1>
            </div>
            <div id="dashboard-content" class="card">
                <!-- Stats injected here -->
            </div>
            <button id="reset-progress-btn" class="btn-block btn-accent" style="background: var(--danger-color); color: white; border-color: var(--danger-shadow);">RESET DATA</button>
        </section>

        <!-- Feedback Overlay -->
        <div id="feedback-overlay" class="overlay">
            <div class="feedback-card">
                <div id="feedback-icon" style="margin-bottom: 20px;">
                    <!-- SVG injected here -->
                </div>
                <h2 id="feedback-text" style="font-weight: 900; font-size: 2rem;">BETUL!</h2>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
